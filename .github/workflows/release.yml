name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: graphify-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            asset_name: graphify-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            asset_name: graphify-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: graphify-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            asset_name: graphify-windows-amd64.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install GCC (Linux ARM64 Cross Compile)
        if: matrix.os == 'ubuntu-latest' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          # Set specific CC for cross-compiling linux/arm64 on linux/amd64 runner
          CC: ${{ matrix.os == 'ubuntu-latest' && matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || '' }}
        run: go build -trimpath -ldflags="-s -w" -o ${{ matrix.asset_name }} ./cmd/graphify

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
